<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AION2 Mobile v1.63mobile</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #0d1117; --panel-bg: rgba(22, 27, 34, 0.98); --neon-blue: #00f3ff; --text-main: #c9d1d9; --border-color: #30363d; --bonus-color: #ffb000; --danger-red: #ff4444; }
        body { background: var(--bg-color); color: var(--text-main); font-family: 'Prompt', sans-serif; margin: 0; padding: 10px; font-size: 14px; overflow-x: hidden; }
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0d1117; display: flex; justify-content: center; align-items: center; color: var(--neon-blue); z-index: 9999; }
        
        .sticky-bar { position: sticky; top: 0; z-index: 1000; background: var(--bg-color); padding-bottom: 10px; }
        .user-bar, .id-selector-bar { background: var(--panel-bg); padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); margin-bottom: 8px; }
        select, input[type="text"], input[type="number"] { background: #161b22; color: #fff; border: 1px solid #444; padding: 8px; border-radius: 6px; font-family: 'Prompt'; font-size: 14px; width: 100%; box-sizing: border-box; }
        
        .id-card { background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 15px; margin-bottom: 20px; position: relative; }
        .stamina-alert-icon { display: none; background: var(--danger-red); color: white; width: 20px; height: 20px; border-radius: 50%; font-weight: bold; align-items: center; justify-content: center; font-size: 12px; margin-right: 8px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.8; } 100% { transform: scale(1); opacity: 1; } }

        .char-card { background: rgba(255,255,255,0.03); border-radius: 10px; padding: 12px; margin-bottom: 15px; border-left: 4px solid var(--neon-blue); }
        .glow-red { border: 2px solid var(--danger-red) !important; box-shadow: 0 0 10px var(--danger-red) !important; }

        .row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
        .grid-3 { display: grid; grid-template-columns: 1.5fr 1fr 1fr; gap: 8px; align-items: center; }
        .grid-checkbox { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 10px 0; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; }
        .check-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #aaa; }
        input[type="checkbox"] { width: 20px; height: 20px; accent-color: #00ff00; }

        button { background: transparent; color: var(--neon-blue); border: 1px solid var(--neon-blue); padding: 8px; border-radius: 6px; font-weight: bold; font-family: 'Prompt'; cursor: pointer; transition: 0.2s; }
        button:active { background: var(--neon-blue); color: #000; }
        .btn-danger { color: #ff4444 !important; border-color: #ff4444 !important; }
        
        .summary-box { background: rgba(0,243,255,0.05); padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); margin-top: 15px; }
        .summary-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px dashed #333; }
        .summary-val { color: var(--neon-blue); font-weight: bold; }
        .total-white { color: #fff; font-weight: bold; }

        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: #161b22; padding: 20px; border-radius: 12px; border: 1px solid var(--neon-blue); width: 100%; max-width: 320px; text-align: center; }
        .vip-status { font-size: 12px; font-weight: bold; margin: 5px 0; }
        .vip-green { color: #00ff00; } .vip-red { color: #ff4444; }
    </style>
</head>
<body>
    <div id="loading">AION2 v1.63mobile...</div>

    <div class="sticky-bar">
        <div class="user-bar">
            <select id="userDropdown" onchange="handleUserSelect(this.value)"></select>
            <div style="display:flex; gap:8px; margin-top:8px;">
                <button style="flex:1" onclick="document.getElementById('userModal').style.display='flex'">+ User</button>
                <button style="flex:1" onclick="refreshData()">🔄 รีเฟรช</button>
            </div>
        </div>
        <div id="id-selector-container" class="id-selector-bar" style="display:none">
            <select id="idDropdown"></select>
        </div>
    </div>

    <div id="main-wrapper"></div>

    <div id="userModal" class="modal"><div class="modal-content"><h3>เพิ่ม User</h3><input type="text" id="newUserName" placeholder="ชื่อ"><input type="password" id="newUserPass" placeholder="รหัสผ่าน"><button style="margin-top:15px" onclick="confirmAddUser()">ตกลง</button><button class="btn-danger" onclick="closeModal('userModal')">ยกเลิก</button></div></div>
    <div id="passModal" class="modal"><div class="modal-content"><h3 id="passModalTitle">รหัสผ่าน</h3><input type="password" id="checkPass"><br><label style="color:#fff; font-size:12px;"><input type="checkbox" id="rememberMe"> จำรหัสผ่าน</label><button style="margin-top:15px" onclick="validateUser()">ตกลง</button><button class="btn-danger" onclick="cancelLogin()">ยกเลิก</button></div></div>
    <div id="vipModal" class="modal"><div class="modal-content"><h3>ตั้งค่า VIP</h3><input type="number" id="vDay" placeholder="วัน"><input type="number" id="vHour" placeholder="ชม."><input type="number" id="vMin" placeholder="นาที"><button style="margin-top:15px" onclick="confirmVIP()">ตกลง</button><button class="btn-danger" onclick="closeModal('vipModal')">ยกเลิก</button></div></div>
    <div id="dunModal" class="modal"><div class="modal-content"><h3>ลงดันเจี้ยน</h3><input type="number" id="dunCount" value="1"><button style="margin-top:15px" onclick="confirmDun()">ตกลง</button><button class="btn-danger" onclick="closeModal('dunModal')">ยกเลิก</button></div></div>

    <script>
        const config = { apiKey: "AIzaSyB8vq1cDV3LuqRmqtNsUqNHjriaEI9oGMM", databaseURL: "https://aion2-checklist-vans-default-rtdb.asia-southeast1.firebasedatabase.app" };
        firebase.initializeApp(config);
        const db = firebase.database();

        let currentUser = ""; let appData = { ids: [] }; let currentIDIdx = 0; let pendingUser = ""; let isSettingPass = false;
        let curDunChar = -1;

        function getThaiTime() { return new Date(new Date().getTime() + (new Date().getTimezoneOffset() * 60000) + (3600000 * 7)); }
        function getBase4AM(t) { let d = new Date(t); if (d.getHours() < 4) d.setDate(d.getDate() - 1); d.setHours(4,0,0,0); return d.getTime(); }
        function getRecentWed4AM(t) { let d = new Date(t); let day = d.getDay(); if (day===3 && d.getHours()<4) { d.setDate(d.getDate()-7); } else { let diff = (day<3)?(day+4):(day-3); d.setDate(d.getDate()-diff); } d.setHours(4,0,0,0); return d.getTime(); }

        async function runResetLogic(data) {
            if (!data || !data.ids || data.ids.length === 0) return data;
            const now = getThaiTime().getTime(); const c4AM = getBase4AM(now); const cWed = getRecentWed4AM(now);
            let anyChange = false;
            data.ids.forEach(id => {
                (id.characters || []).forEach(c => {
                    let last = c.lastUpdate || now; let changed = false;
                    if (last < cWed) { c.fb = 35; c.daily = false; c.buy = false; c.craft = false; c.raid = false; c.asc = false; changed = true; }
                    if (last < c4AM) { c.duty = false; let days = Math.floor((c4AM - getBase4AM(last)) / 86400000); if (days > 0) c.nm = Math.min(14, (parseInt(c.nm) || 0) + (2 * days)); changed = true; }
                    let l4S = getBase4AM(last);
                    let iPS = (Math.floor((c4AM-l4S)/86400000)*8) + Math.floor((now-c4AM)/10800000) - Math.floor((last-l4S)/10800000);
                    if (iPS > 0) { c.stamina = Math.min(840, (parseInt(c.stamina)||0)+(iPS*(id.isVIP?15:10))); changed = true; }
                    let iPR = Math.floor((now - l4S)/28800000) - Math.floor((last - l4S)/28800000);
                    if (iPR > 0) { c.rc = Math.min(21, (parseInt(c.rc)||0) + iPR); changed = true; }
                    if (changed) { c.lastUpdate = now; anyChange = true; }
                });
            });
            if (anyChange && currentUser) await db.ref(`userData/${currentUser}/ids`).set(data.ids);
            return data;
        }

        window.loadUserList = function() {
            db.ref('userData').once('value').then(snap => {
                const dd = document.getElementById('userDropdown'); dd.innerHTML = '<option value="">-- เลือก User --</option>';
                if(snap.exists()) { Object.keys(snap.val()).forEach(u => { const opt = document.createElement('option'); opt.value = u; opt.text = u; dd.add(opt); }); }
                document.getElementById('loading').style.display = 'none';
            });
        };

        window.handleUserSelect = function(u) {
            if(!u) return; pendingUser = u;
            db.ref(`userData/${u}/password`).once('value').then(snap => {
                const saved = localStorage.getItem(`pass_${u}`);
                if (snap.exists() && snap.val() !== "" && saved === snap.val()) { switchUser(u); }
                else {
                    isSettingPass = !snap.exists() || snap.val() === "";
                    document.getElementById('passModal').style.display = 'flex';
                }
            });
        };

        async function switchUser(u) {
            currentUser = u; document.getElementById('loading').style.display = 'flex';
            const snap = await db.ref(`userData/${u}`).once('value');
            let rawData = snap.val() || { ids: [] };
            appData = await runResetLogic(rawData);
            currentIDIdx = 0; updateIDDropdown(); renderUI();
            document.getElementById('loading').style.display = 'none';
        }

        function updateIDDropdown() {
            const dd = document.getElementById('idDropdown'); const container = document.getElementById('id-selector-container');
            if(!appData.ids || appData.ids.length === 0) { container.style.display = 'none'; return; }
            container.style.display = 'block';
            dd.innerHTML = appData.ids.map((id, i) => `<option value="${i}" ${i==currentIDIdx?'selected':''}>ID: ${id.idName||'Unnamed'}</option>`).join('');
            dd.innerHTML += `<option value="ADD">+ เพิ่ม ID ใหม่</option>`;
            dd.onchange = (e) => { if(e.target.value === "ADD") addNewID(); else { currentIDIdx = e.target.value; renderUI(); } };
        }

        window.syncDataFromUI = function() {
            if(!currentUser || !appData.ids[currentIDIdx]) return;
            const id = appData.ids[currentIDIdx]; const card = document.querySelector('.id-card');
            id.idName = card.querySelector('.id-name-input').value; id.kinahTotal = card.querySelector('.kinah-total').value;
            id.isVIP = card.querySelector('.vip-check').checked; id.trans = card.querySelector('.in-trans').value;
            id.conq = card.querySelector('.in-conq').value; id.setTotal = card.querySelector('.in-set-total').value;
            
            const charCards = card.querySelectorAll('.char-card');
            id.characters = Array.from(charCards).map((c, i) => ({
                name: c.querySelector('.c-name').value, class: c.querySelector('.c-class').value,
                stamina: c.querySelector('.c-stam').value, staminaBonus: c.querySelector('.c-stam-b').value,
                fb: c.querySelector('.c-fb').value, rc: c.querySelector('.c-rc').value, rcBonus: c.querySelector('.c-rc-b').value,
                nm: c.querySelector('.c-nm').value, nmBonus: c.querySelector('.c-nm-b').value,
                duty: c.querySelector('.c-duty').checked, raid: c.querySelector('.c-raid').checked, asc: c.querySelector('.c-asc').checked,
                daily: c.querySelector('.c-daily').checked, buy: c.querySelector('.c-buy').checked, craft: c.querySelector('.c-craft').checked,
                lastUpdate: id.characters[i].lastUpdate || getThaiTime().getTime()
            }));
            db.ref(`userData/${currentUser}/ids`).set(appData.ids); updateCalcs();
        };

        function renderUI() {
            const w = document.getElementById('main-wrapper'); w.innerHTML = '';
            if(!currentUser || !appData.ids[currentIDIdx]) return;
            const id = appData.ids[currentIDIdx]; const now = getThaiTime().getTime();
            let vS = "", vC = "vip-red";
            if(id.vipExpiry > now) {
                const diff = id.vipExpiry-now, d = Math.floor(diff/86400000), h = Math.floor((diff%86400000)/3600000), m = Math.floor((diff%3600000)/60000);
                vS = `VIP: ${d}วัน ${h}ชม. ${m}นาที`; if(d>=7) vC="vip-green";
            }

            const chars = (id.characters || []).map((c, ci) => `
                <div class="char-card">
                    <div class="row">
                        <input type="text" class="c-name" value="${c.name||''}" placeholder="ชื่อ" onchange="syncDataFromUI()">
                        <select class="c-class" onchange="syncDataFromUI()"><option value="">อาชีพ</option>${['Templar','Gladiator','Assassin','Sorceror','Elementalist','Cleric','Ranger','Chanter'].map(cls=>`<option value="${cls}" ${c.class===cls?'selected':''}>${cls}</option>`).join('')}</select>
                        <button class="btn-danger" style="width:50px" onclick="removeChar(${ci})">ลบ</button>
                    </div>
                    <div class="row">
                        <div style="flex:1">Stam <input type="number" class="c-stam" value="${c.stamina||0}" onchange="syncDataFromUI()"></div>
                        <div style="flex:1">+ <input type="number" class="c-stam-b" style="color:var(--bonus-color)" value="${c.staminaBonus||0}" onchange="syncDataFromUI()"></div>
                        <div style="flex:0.5; text-align:right"><span class="stam-total total-white">0</span></div>
                    </div>
                    <div class="grid-3" style="margin-top:10px">
                        <div>RC <input type="number" class="c-rc" value="${c.rc||0}" onchange="syncDataFromUI()">+<input type="number" class="c-rc-b" value="${c.rcBonus||0}" onchange="syncDataFromUI()"><br><span class="rc-total total-white">0</span></div>
                        <div>FB <input type="number" class="c-fb" value="${c.fb||35}" onchange="syncDataFromUI()"></div>
                        <div style="text-align:right">รอบดัน<br><span class="run-count total-white">0</span></div>
                    </div>
                    <div class="grid-checkbox">
                        <div class="check-item"><input type="checkbox" class="c-duty" ${c.duty?'checked':''}>Duty</div>
                        <div class="check-item"><input type="checkbox" class="c-raid" ${c.raid?'checked':''}>Raid</div>
                        <div class="check-item"><input type="checkbox" class="c-asc" ${c.asc?'checked':''}>Asc</div>
                        <div class="check-item"><input type="checkbox" class="c-daily" ${c.daily?'checked':''}>Daily</div>
                        <div class="check-item"><input type="checkbox" class="c-buy" ${c.buy?'checked':''}>Buy</div>
                        <div class="check-item"><input type="checkbox" class="c-craft" ${c.craft?'checked':''}>Craft</div>
                    </div>
                    <div class="row">
                        <div style="flex:1">Nightmare <input type="number" class="c-nm" value="${c.nm||0}" onchange="syncDataFromUI()"> + <input type="number" class="c-nm-b" style="color:var(--bonus-color)" value="${c.nmBonus||0}" onchange="syncDataFromUI()"></div>
                        <button style="flex:0.3" onclick="openDun(${ci})">ดัน</button>
                    </div>
                </div>`).join('');

            w.innerHTML = `
                <div class="id-card">
                    <div class="row"><div class="stamina-alert-icon">!</div><input type="text" class="id-name-input" style="background:transparent; border:none; border-bottom:1px dashed #444; color:var(--neon-blue); font-size:1.3rem; font-weight:bold;" value="${id.idName||''}" onchange="syncDataFromUI()"><button style="width:80px" onclick="resetID()">Reset</button></div>
                    <div class="vip-status ${vC}">${vS}</div>
                    <div class="row"><label style="display:flex; align-items:center; gap:8px;"><input type="checkbox" class="vip-check" ${id.isVIP?'checked':''} onchange="syncDataFromUI()"> VIP</label><button style="width:100px" onclick="document.getElementById('vipModal').style.display='flex'">ตั้งเวลา VIP</button></div>
                    <div class="row">เงินรวม <input type="text" class="kinah-total" style="width:150px" value="${id.kinahTotal||0}" onchange="syncDataFromUI()"></div>
                    <div id="chars-container">${chars}</div>
                    <button onclick="addChar()">+ เพิ่มตัวละคร</button>
                    <div class="summary-box">
                        <div class="summary-row"><span>Trans</span><input type="number" class="in-trans" style="width:80px" value="${id.trans||0}" onchange="syncDataFromUI()"></div>
                        <div class="summary-row"><span>Conq</span><input type="number" class="in-conq" style="width:80px" value="${id.conq||0}" onchange="syncDataFromUI()"></div>
                        <div class="summary-row"><span>เป้าหมาย</span><input type="number" class="in-set-total" style="width:80px" value="${id.setTotal||0}" onchange="syncDataFromUI()"></div>
                        <div class="summary-row"><span>ปัจจุบัน</span><span class="summary-current summary-val">0</span></div>
                        <div class="summary-row"><span>คงเหลือ</span><span class="summary-remain" style="color:var(--neon-blue); font-weight:bold;">0</span></div>
                    </div>
                </div>`;
            
            // ผูก Event Checkbox ทับ (เพื่อความนิ่ง)
            w.querySelectorAll('input[type="checkbox"]').forEach(ck => ck.addEventListener('change', syncDataFromUI));
            updateCalcs();
        }

        function updateCalcs() {
            const id = appData.ids[currentIDIdx]; if(!id) return;
            const card = document.querySelector('.id-card'); const charCards = card.querySelectorAll('.char-card');
            let hasFullStam = false;
            (id.characters || []).forEach((c, i) => {
                const mainS = parseInt(c.stamina)||0; const totalS = mainS + (parseInt(c.staminaBonus)||0);
                const totalR = (parseInt(c.rc)||0) + (parseInt(c.rcBonus)||0);
                const runs = Math.min(Math.floor(totalS/80), parseInt(c.fb)||0, totalR);
                const cBox = charCards[i];
                if(cBox) {
                    const sInp = cBox.querySelector('.c-stam');
                    if(mainS >= 840) { sInp.classList.add('glow-red'); hasFullStam = true; } else { sInp.classList.remove('glow-red'); }
                    cBox.querySelector('.stam-total').innerText = totalS;
                    cBox.querySelector('.rc-total').innerText = totalR;
                    cBox.querySelector('.run-count').innerText = runs;
                }
            });
            card.querySelector('.stamina-alert-icon').style.display = hasFullStam ? 'flex' : 'none';
            const cur = (parseInt(id.trans)||0) + (parseInt(id.conq)||0);
            card.querySelector('.summary-current').innerText = cur;
            card.querySelector('.summary-remain').innerText = (parseInt(id.setTotal)||0) - cur;
        }

        window.addNewID = () => { appData.ids.push({idName:"ID ใหม่", characters:[], trans:0, conq:0, setTotal:0}); currentIDIdx = appData.ids.length-1; updateIDDropdown(); renderUI(); syncDataFromUI(); };
        window.addChar = () => { appData.ids[currentIDIdx].characters.push({name:"", class:"", stamina:840, staminaBonus:0, fb:35, rc:21, rcBonus:0, lastUpdate: getThaiTime().getTime()}); renderUI(); syncDataFromUI(); };
        window.removeChar = (ci) => { if(confirm("ลบ?")) { appData.ids[currentIDIdx].characters.splice(ci,1); renderUI(); syncDataFromUI(); } };
        window.openVIPModal = (i) => { document.getElementById('vipModal').style.display='flex'; };
        window.confirmVIP = () => { const d=parseInt(document.getElementById('vDay').value)||0, h=parseInt(document.getElementById('vHour').value)||0, m=parseInt(document.getElementById('vMin').value)||0; appData.ids[currentIDIdx].vipExpiry = getThaiTime().getTime() + (d*86400000) + (h*3600000) + (m*60000); closeModal('vipModal'); renderUI(); syncDataFromUI(); };
        window.openDun = (ci) => { curDunChar=ci; document.getElementById('dunModal').style.display='flex'; };
        window.confirmDun = () => { const count=parseInt(document.getElementById('dunCount').value); const c = appData.ids[currentIDIdx].characters[curDunChar]; c.stamina=Math.max(0, c.stamina-(count*80)); c.fb=Math.max(0, c.fb-count); c.rc=Math.max(0, c.rc-count); closeModal('dunModal'); renderUI(); syncDataFromUI(); };
        window.closeModal = (id) => document.getElementById(id).style.display='none';
        window.refreshData = () => { if(currentUser) switchUser(currentUser); };
        window.validateUser = function() {
            const p = document.getElementById('checkPass').value.trim(); const rem = document.getElementById('rememberMe').checked;
            db.ref(`userData/${pendingUser}/password`).once('value').then(snap => {
                if(!snap.exists() || snap.val() === p) { if(rem) localStorage.setItem(`pass_${pendingUser}`, p); closeModal('passModal'); switchUser(pendingUser); }
                else alert("รหัสผิด");
            });
        };
        window.cancelLogin = () => { closeModal('passModal'); document.getElementById('userDropdown').value = currentUser; };
        window.resetID = () => { if(confirm("Reset ID?")) { appData.ids[currentIDIdx].characters.forEach(c => { c.stamina=840; c.fb=35; c.rc=21; c.duty=c.raid=c.asc=c.daily=c.buy=c.craft=false; }); renderUI(); syncDataFromUI(); } };
        window.confirmAddUser = function() { const n=document.getElementById('newUserName').value.trim(), p=document.getElementById('newUserPass').value.trim(); if(!n||!p) return alert("ห้ามว่าง"); db.ref(`userData/${n}`).set({ids:[], password:p}).then(() => { closeModal('userModal'); loadUserList(); }); };

        loadUserList();
    </script>
</body>
</html>
