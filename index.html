<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AION2 Check List v1.02</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: rgba(22, 27, 34, 0.85); 
            --neon-blue: #00f3ff;
            --text-main: #c9d1d9;
            --border-color: #30363d;
            --bonus-color: #ffb000;
        }

        body {
            background-image: 
                linear-gradient(rgba(13, 17, 23, 0.85), rgba(13, 17, 23, 0.85)), 
                url('pic/background.jpg'); 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed; 
            color: var(--text-main);
            font-family: 'Prompt', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .header-container { text-align: center; margin-bottom: 30px; }
        .logo-img { max-width: 250px; height: auto; margin-bottom: 10px; }
        h1 { color: var(--neon-blue); text-transform: uppercase; letter-spacing: 2px; margin: 0; text-shadow: 0 0 10px rgba(0, 243, 255, 0.5); }

        .id-container {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0, 243, 255, 0.1);
            position: relative; 
            backdrop-filter: blur(5px);
        }

        .id-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid var(--border-color); }
        .id-header input[type="text"] {
            background: transparent; border: none; color: var(--neon-blue); font-size: 1.4rem; font-weight: bold;
            outline: none; border-bottom: 1px dashed var(--border-color); width: 200px; font-family: 'Prompt', sans-serif;
        }

        .vip-check { display: flex; align-items: center; gap: 5px; color: #ffcc00; font-weight: bold; }
        
        input[type="checkbox"] {
            accent-color: #00ff00;
            width: 18px; height: 18px; cursor: pointer;
        }

        .btn-reset-id {
            position: absolute; top: 20px; right: 20px; background-color: transparent; color: var(--bonus-color);
            border: 1px solid var(--bonus-color); padding: 6px 12px; font-size: 0.9rem; border-radius: 4px;
            cursor: pointer; transition: 0.2s; font-weight: bold; font-family: 'Prompt', sans-serif;
        }
        .btn-reset-id:hover { background-color: var(--bonus-color); color: #000; }

        table { width: 100%; border-collapse: collapse; text-align: center; font-size: 0.9rem; }
        th, td { border: 1px solid var(--border-color); padding: 8px 4px; }
        th { background-color: rgba(33, 38, 45, 0.8); color: #ffffff; font-weight: 600; }

        input[type="number"], input[type="text"] {
            background: rgba(13, 17, 23, 0.8); color: white; border: 1px solid #444; border-radius: 4px;
            padding: 4px; width: 45px; text-align: center; font-family: 'Prompt', sans-serif; transition: 0.3s;
        }
        input[type="text"].char-name { width: 120px; text-align: left; padding-left: 8px; }
        .split-input { display: flex; align-items: center; justify-content: center; gap: 4px; white-space: nowrap; }
        .bonus-text { color: var(--bonus-color); font-size: 0.85rem; }
        input[type="number"].bonus-input { color: var(--bonus-color); border-color: #664400; }

        button {
            background-color: transparent; color: var(--neon-blue); border: 1px solid var(--neon-blue);
            padding: 6px 12px; cursor: pointer; border-radius: 4px; transition: all 0.2s; font-weight: bold; font-family: 'Prompt', sans-serif;
        }
        button:hover { background-color: var(--neon-blue); color: #000; }
        .btn-danger { color: #ff4444; border-color: #ff4444; }
        .btn-danger:hover { background-color: #ff4444; color: white; }

        .glow-red { border-color: #ff3333 !important; box-shadow: 0 0 8px #ff3333; }
        .glow-green { border-color: #00ff00 !important; box-shadow: 0 0 8px #00ff00; }
        
        #loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(13, 17, 23, 0.9); display: flex; justify-content: center; align-items: center;
            color: var(--neon-blue); font-size: 1.5rem; z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="loading">กำลังซิงค์ข้อมูลกับเซิร์ฟเวอร์ และคำนวณเวลา...</div>

    <div class="header-container">
        <img src="pic/logo.png" alt="AION 2 Logo" class="logo-img">
        <h1>AION2 Check List version 1.02 by VANS</h1>
    </div>

    <div id="main-wrapper"></div>

    <div style="text-align: center; margin-top: 20px;">
        <button onclick="window.addNewID()">+ เพิ่ม ID ใหม่</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB8vq1cDV3LuqRmqtNsUqNHjriaEI9oGMM",
            authDomain: "aion2-checklist-vans.firebaseapp.com",
            databaseURL: "https://aion2-checklist-vans-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "aion2-checklist-vans",
            storageBucket: "aion2-checklist-vans.firebasestorage.app",
            messagingSenderId: "175263444943",
            appId: "1:175263444943:web:025867abf79262b5e1acba",
            measurementId: "G-VZZFX13ZGX"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dbRef = ref(db, 'userData/vans');

        let appData = { ids: [] };

        // ==========================================
        // แก้เวลาตรงนี้ !!!
        // ==========================================
        function getThaiTime() {
            // Timezone +7 เวลาไทย
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            return new Date(utc + (3600000 * 7)); 
        }

        function getBase4AM(date) {
            let d = new Date(date);
            if (d.getHours() < 4) d.setDate(d.getDate() - 1);
            d.setHours(4, 0, 0, 0);
            return d.getTime();
        }

        function getRecentWednesday4AM(date) {
            let d = new Date(date);
            let day = d.getDay(); // 0=Sun, 1=Mon, ..., 3=Wed
            if (day === 3 && d.getHours() >= 4) {

            } else {

                let diff = (day < 3) ? (day + 4) : (day - 3);
                d.setDate(d.getDate() - diff);
            }
            d.setHours(4, 0, 0, 0);
            return d.getTime();
        }

        function processTimeLogic(data) {
            const now = getThaiTime();
            const nowTime = now.getTime();
            const current4AM = getBase4AM(now);
            const currentWed4AM = getRecentWednesday4AM(now);

            data.ids.forEach(id => {
                id.characters.forEach(char => {
                    let lastUpdate = char.lastUpdate || nowTime;
                    
                    // 1. Weekly Reset
                    if (lastUpdate < currentWed4AM) {
                        char.raid = 3;
                        char.ascension = 3;
                        char.daily = 7;
                        char.finalBoss = 35;
                        char.duty = false;
                        char.buyEnergy = false;
                        char.craftEnergy = false;
                    }

                    // 2. Daily Reset (ทุกวัน ตี 4)
                    if (lastUpdate < current4AM) {
                        let daysPassed = Math.floor((current4AM - getBase4AM(new Date(lastUpdate))) / (24 * 3600000));
                        if (daysPassed > 0) {
                            char.nightmare = Math.min(14, (parseInt(char.nightmare) || 0) + (2 * daysPassed));
                        }
                    }

                    // 3. Stamina Regen
                    let last4AMForStamina = getBase4AM(new Date(lastUpdate));
                    let intervalsNow = Math.floor((nowTime - current4AM) / (3 * 3600000));
                    let intervalsLast = Math.floor((lastUpdate - last4AMForStamina) / (3 * 3600000));
                    
                    let daysDiffStam = Math.floor((current4AM - last4AMForStamina) / (24 * 3600000));
                    let totalIntervalsPassed = (daysDiffStam * 8) + intervalsNow - intervalsLast;

                    if (totalIntervalsPassed > 0) {
                        let regenAmount = id.isVIP ? 15 : 10;
                        char.stamina = Math.min(840, (parseInt(char.stamina) || 0) + (totalIntervalsPassed * regenAmount));
                    }

                    // 4. Reward Count Regen
                    let intervalsNowRew = Math.floor((nowTime - current4AM) / (8 * 3600000));
                    let intervalsLastRew = Math.floor((lastUpdate - last4AMForStamina) / (8 * 3600000));
                    let totalIntervalsPassedRew = (daysDiffStam * 3) + intervalsNowRew - intervalsLastRew;

                    if (totalIntervalsPassedRew > 0) {
                        char.rewardCount = Math.min(21, (parseInt(char.rewardCount) || 0) + (totalIntervalsPassedRew * 1));
                    }

                    char.lastUpdate = nowTime;
                });
            });
            return data;
        }

        // ==========================================
        // แก้ UI ตรงนี้
        // ==========================================
        
        // Firebase code ไว้ตรงนี้
        function saveData() {
            set(dbRef, appData).catch(error => console.error("Error saving data:", error));
        }

        window.syncDataFromUI = function() {
            appData.ids = [];
            const idBlocks = document.querySelectorAll('.id-container');
            
            idBlocks.forEach((block, idIndex) => {
                let idObj = {
                    idName: block.querySelector('.id-name-input').value,
                    isVIP: block.querySelector('.vip-input').checked,
                    characters: []
                };

                const rows = block.querySelectorAll('tbody tr');
                rows.forEach((row, charIndex) => {
                    let oldCharData = (appData.ids[idIndex] && appData.ids[idIndex].characters[charIndex]) || {};
                    
                    idObj.characters.push({
                        name: row.querySelector('.char-name').value,
                        stamina: row.querySelector('.stam-main').value,
                        staminaBonus: row.querySelector('.stam-bonus').value,
                        duty: row.querySelector('.duty-check').checked,
                        raid: row.querySelector('.raid-main').value,
                        raidBonus: row.querySelector('.raid-bonus').value,
                        ascension: row.querySelector('.asc-main').value,
                        ascensionBonus: row.querySelector('.asc-bonus').value,
                        daily: row.querySelector('.daily-main').value,
                        nightmare: row.querySelector('.nm-main').value,
                        nightmareBonus: row.querySelector('.nm-bonus').value,
                        buyEnergy: row.querySelector('.buy-check').checked,
                        craftEnergy: row.querySelector('.craft-check').checked,
                        finalBoss: row.querySelector('.fb-main').value,
                        rewardCount: row.querySelector('.rc-main').value,
                        lastUpdate: oldCharData.lastUpdate || getThaiTime().getTime()
                    });
                });
                appData.ids.push(idObj);
            });
            saveData(); // เซฟ Firebase
        };

        window.updateGlow = function(inputElement) {
            let val = parseInt(inputElement.value);
            inputElement.classList.remove('glow-red', 'glow-green');
            if (val === 0) inputElement.classList.add('glow-green');
            else inputElement.classList.add('glow-red');
            window.syncDataFromUI();
        };

        function renderUI() {
            const wrapper = document.getElementById('main-wrapper');
            wrapper.innerHTML = '';

            appData.ids.forEach((idData, idIndex) => {
                const idBlock = document.createElement('div');
                idBlock.className = 'id-container';
                idBlock.id = `id-block-${idIndex}`;
                
                let tbodyHTML = '';
                idData.characters.forEach((char, charIndex) => {
                    const getGlow = (val) => parseInt(val) === 0 ? 'glow-green' : 'glow-red';

                    tbodyHTML += `
                        <tr>
                            <td><input type="text" class="char-name" placeholder="ชื่อตัวละคร" value="${char.name || ''}" oninput="window.syncDataFromUI()"></td>
                            <td><div class="split-input"><input type="number" class="stam-main" min="0" max="840" value="${char.stamina}" oninput="window.syncDataFromUI()"><span class="bonus-text">(+</span><input type="number" class="bonus-input stam-bonus" placeholder="0" value="${char.staminaBonus}" oninput="window.syncDataFromUI()"><span class="bonus-text">)</span></div></td>
                            <td><input type="checkbox" class="duty-check" ${char.duty ? 'checked' : ''} onchange="window.syncDataFromUI()"></td>
                            <td><div class="split-input"><input type="number" class="target-glow raid-main ${getGlow(char.raid)}" min="0" max="3" value="${char.raid}" oninput="window.updateGlow(this)"><span class="bonus-text">(+</span><input type="number" class="bonus-input raid-bonus" placeholder="0" value="${char.raidBonus}" oninput="window.syncDataFromUI()"><span class="bonus-text">)</span></div></td>
                            <td><div class="split-input"><input type="number" class="target-glow asc-main ${getGlow(char.ascension)}" min="0" max="3" value="${char.ascension}" oninput="window.updateGlow(this)"><span class="bonus-text">(+</span><input type="number" class="bonus-input asc-bonus" placeholder="0" value="${char.ascensionBonus}" oninput="window.syncDataFromUI()"><span class="bonus-text">)</span></div></td>
                            <td><input type="number" class="target-glow daily-main ${getGlow(char.daily)}" min="0" max="7" value="${char.daily}" oninput="window.updateGlow(this)"></td>
                            <td><div class="split-input"><input type="number" class="nm-main" min="0" max="14" value="${char.nightmare}" oninput="window.syncDataFromUI()"><span class="bonus-text">(+</span><input type="number" class="bonus-input nm-bonus" placeholder="0" value="${char.nightmareBonus}" oninput="window.syncDataFromUI()"><span class="bonus-text">)</span></div></td>
                            <td><input type="checkbox" class="buy-check" ${char.buyEnergy ? 'checked' : ''} onchange="window.syncDataFromUI()"></td>
                            <td><input type="checkbox" class="craft-check" ${char.craftEnergy ? 'checked' : ''} onchange="window.syncDataFromUI()"></td>
                            <td><input type="number" class="fb-main" min="0" max="35" value="${char.finalBoss}" oninput="window.syncDataFromUI()"></td>
                            <td><input type="number" class="rc-main" min="0" max="21" value="${char.rewardCount}" oninput="window.syncDataFromUI()"></td>
                            <td><button class="btn-danger" onclick="window.removeCharacter(${idIndex}, ${charIndex})">-</button></td>
                        </tr>
                    `;
                });

                idBlock.innerHTML = `
                    <button class="btn-reset-id" onclick="window.resetIDToMax(${idIndex})">🔄 Reset Max</button>
                    <div class="id-header">
                        <label class="vip-check">
                            <input type="checkbox" class="vip-input" ${idData.isVIP ? 'checked' : ''} onchange="window.syncDataFromUI()"> VIP
                        </label>
                        <span>ID:</span>
                        <input type="text" class="id-name-input" value="${idData.idName}" oninput="window.syncDataFromUI()">
                        <button onclick="window.addCharacter(${idIndex})">+ เพิ่มตัวละคร</button>
                        <button class="btn-danger" onclick="window.removeID(${idIndex})">ลบ ID นี้</button>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>Character Name</th><th>Stamina<br><small>(Max 840)</small></th><th>Duty<br>Mission</th>
                                <th>Raid<br><small>(Max 3)</small></th><th>Ascension<br><small>(Max 3)</small></th><th>Daily<br><small>(Max 7)</small></th>
                                <th>Nightmare<br><small>(Max 14)</small></th><th>Buy<br>Energy</th><th>Craft<br>Energy</th>
                                <th>Final Boss<br><small>(Max 35)</small></th><th>Reward Count<br><small>(Max 21)</small></th><th>จัดการ</th>
                            </tr>
                        </thead>
                        <tbody>${tbodyHTML}</tbody>
                    </table>
                `;
                wrapper.appendChild(idBlock);
            });
        }

        // ==========================================
        // ส่วนตารางแก้ตรงนี้
        // ==========================================
        function createDefaultChar() {
            return {
                name: "", stamina: 840, staminaBonus: 0, duty: false, raid: 3, raidBonus: 0,
                ascension: 3, ascensionBonus: 0, daily: 7, nightmare: 14, nightmareBonus: 0,
                buyEnergy: false, craftEnergy: false, finalBoss: 35, rewardCount: 21, lastUpdate: getThaiTime().getTime()
            };
        }

        window.addNewID = function() {
            appData.ids.push({
                idName: `ID_${appData.ids.length + 1}`,
                isVIP: false,
                characters: [createDefaultChar(), createDefaultChar(), createDefaultChar()]
            });
            saveData();
            renderUI();
        };

        window.addCharacter = function(idIndex) {
            if (appData.ids[idIndex].characters.length >= 8) {
                alert("เพิ่มตัวละครได้สูงสุด 8 ตัว"); return;
            }
            appData.ids[idIndex].characters.push(createDefaultChar());
            saveData();
            renderUI();
        };

        window.removeCharacter = function(idIndex, charIndex) {
            if (appData.ids[idIndex].characters.length <= 1) {
                alert("ต้องมีตัวละครอย่างน้อย 1"); return;
            }
            appData.ids[idIndex].characters.splice(charIndex, 1);
            saveData();
            renderUI();
        };

        window.removeID = function(idIndex) {
            if(confirm("ต้องการลบ ID นี้?")) {
                appData.ids.splice(idIndex, 1);
                saveData();
                renderUI();
            }
        };

        window.resetIDToMax = function(idIndex) {
            if(confirm("Reset รอบทั้งหมด ?")) {
                appData.ids[idIndex].characters.forEach(char => {
                    char.stamina = 840; char.raid = 3; char.ascension = 3; char.daily = 7;
                    char.nightmare = 14; char.finalBoss = 35; char.rewardCount = 21;
                });
                saveData();
                renderUI();
            }
        };


        get(dbRef).then((snapshot) => {
            if (snapshot.exists()) {
                appData = snapshot.val();
                if (!appData.ids) appData.ids = [];

                appData = processTimeLogic(appData); 
                saveData();
            } else {

                window.addNewID(); 
            }
            renderUI();
            document.getElementById('loading').style.display = 'none';
        }).catch((error) => {
            console.error(error);
            alert("ไม่สามารถเชื่อมต่อฐานข้อมูลได้");
        });

    </script>
</body>
</html>
