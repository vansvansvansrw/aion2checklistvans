<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AION2 Check List v1.22 (Final Fix)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #0d1117; --panel-bg: rgba(22, 27, 34, 0.85); --neon-blue: #00f3ff; --text-main: #c9d1d9; --border-color: #30363d; --bonus-color: #ffb000; }
        body { background-image: linear-gradient(rgba(13, 17, 23, 0.85), rgba(13, 17, 23, 0.85)), url('pic/background.jpg'); background-size: cover; background-position: center; background-attachment: fixed; color: var(--text-main); font-family: 'Prompt', sans-serif; margin: 0; padding: 20px; }
        .header-container { text-align: center; margin-bottom: 30px; }
        .logo-img { max-width: 250px; height: auto; margin-bottom: 10px; }
        h1 { color: var(--neon-blue); text-transform: uppercase; letter-spacing: 2px; margin: 0; text-shadow: 0 0 10px rgba(0, 243, 255, 0.5); }
        .id-container { background-color: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 20px; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0, 243, 255, 0.1); position: relative; backdrop-filter: blur(5px); }
        .id-header { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid var(--border-color); flex-wrap: wrap; }
        .id-header input[type="text"].id-name-input { background: transparent; border: none; color: var(--neon-blue); font-size: 1.4rem; font-weight: bold; outline: none; border-bottom: 1px dashed var(--border-color); width: 150px; font-family: 'Prompt', sans-serif; }
        .kinah-id-wrapper { margin-left: auto; margin-right: 90px; display: flex; align-items: center; gap: 8px; }
        .kinah-total-id { background: rgba(13, 17, 23, 0.8); border: 1px solid var(--neon-blue); color: #fff; font-size: 1.1rem; padding: 5px 10px; border-radius: 4px; width: 170px; text-align: right; font-family: 'Prompt', sans-serif; }
        .vip-status { font-size: 0.9rem; font-weight: bold; width: 100%; margin-top: 5px; }
        .vip-green { color: #00ff00; } .vip-red { color: #ff4444; }
        .btn-reset-id { position: absolute; top: 20px; right: 20px; background-color: transparent; color: var(--bonus-color); border: 1px solid var(--bonus-color); padding: 6px 12px; font-size: 0.9rem; border-radius: 4px; cursor: pointer; transition: 0.2s; font-weight: bold; }
        .tab-controls { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn-tab { background: rgba(33, 38, 45, 0.8); color: var(--text-main); border: 1px solid var(--border-color); padding: 8px 16px; border-radius: 4px; cursor: pointer; font-family: 'Prompt', sans-serif; }
        .btn-tab.active { background: var(--neon-blue); color: #000; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; text-align: center; font-size: 0.85rem; margin-bottom: 15px; }
        th, td { border: 1px solid var(--border-color); padding: 8px 4px; }
        th { background-color: rgba(33, 38, 45, 0.8); color: #ffffff; }
        input[type="number"], input[type="text"], select { background: rgba(13, 17, 23, 0.8); color: white; border: 1px solid #444; border-radius: 4px; padding: 4px; text-align: center; font-family: 'Prompt', sans-serif; }
        .split-input { display: flex; align-items: center; justify-content: flex-end; gap: 2px; }
        .total-white { color: #fff; font-weight: bold; min-width: 45px; text-align: right; padding-left: 5px; }
        input[type="number"].bonus-input { color: var(--bonus-color); border-color: #664400; width: 40px; padding: 2px; }
        input[type="number"].standard-num { width: 60px; }
        input[type="checkbox"] { accent-color: #00ff00; width: 18px; height: 18px; cursor: pointer; appearance: none; border: 2px solid #ff4444; border-radius: 3px; position: relative; background: rgba(255,0,0,0.1); }
        input[type="checkbox"]:checked { background-color: #00ff00; border-color: #00ff00; appearance: auto; }
        input[type="checkbox"]:not(:checked) { box-shadow: 0 0 5px #ff4444; }
        .summary-table-container { display: flex; justify-content: center; width: 100%; margin-top: 15px; }
        .summary-table { width: 480px !important; border: 1px solid var(--border-color); }
        .summary-table td { text-align: left; padding: 10px 15px; }
        .summary-table input { width: 80px; text-align: center; }
        .summary-val { color: var(--neon-blue); font-weight: bold; text-align: center !important; }
        button { background-color: transparent; color: var(--neon-blue); border: 1px solid var(--neon-blue); padding: 6px 12px; cursor: pointer; border-radius: 4px; font-weight: bold; font-family: 'Prompt', sans-serif; }
        button:hover { background-color: var(--neon-blue); color: #000; }
        .btn-danger { color: #ff4444; border-color: #ff4444; }
        .red-text { color: #ff4444; font-weight: bold; }

        /* แก้ไข Pop-up VIP ให้จัดหน้าสวยงาม (v1.22 Fix) */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        .modal-content { background: #161b22; padding: 25px; border-radius: 10px; border: 2px solid var(--neon-blue); width: 320px; text-align: center; box-shadow: 0 0 30px rgba(0,243,255,0.2); }
        .vip-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; padding: 0 20px; }
        .vip-row label { font-size: 1.1rem; color: #fff; width: 60px; text-align: left; }
        .vip-row input { width: 120px; font-size: 1.1rem; }
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0d1117; display: flex; justify-content: center; align-items: center; color: var(--neon-blue); font-size: 1.5rem; z-index: 3000; }
    </style>
</head>
<body>
    <div id="loading">กำลังซิงค์ข้อมูล v1.22...</div>
    <div id="vipModal" class="modal"><div class="modal-content"><h3>ตั้งค่า VIP คงเหลือ</h3><div class="vip-row"><label>วัน</label><input type="number" id="vDay" value="0"></div><div class="vip-row"><label>ชม.</label><input type="number" id="vHour" value="0"></div><div class="vip-row"><label>นาที</label><input type="number" id="vMin" value="0"></div><div style="margin-top:20px;"><button onclick="confirmVIP()">ตกลง</button> <button class="btn-danger" onclick="closeVIP()">ยกเลิก</button></div></div></div>
    <div class="header-container"><img src="pic/logo.png" alt="AION 2 Logo" class="logo-img"><h1>AION2 Check List v1.22 by VANS</h1></div>
    <div id="main-wrapper"></div>
    <div style="text-align: center; margin-top: 20px;"><button onclick="window.addNewID()">+ เพิ่ม ID ใหม่</button></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyB8vq1cDV3LuqRmqtNsUqNHjriaEI9oGMM", authDomain: "aion2-checklist-vans.firebaseapp.com", databaseURL: "https://aion2-checklist-vans-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "aion2-checklist-vans", storageBucket: "aion2-checklist-vans.firebasestorage.app", messagingSenderId: "175263444943", appId: "1:175263444943:web:025867abf79262b5e1acba", measurementId: "G-VZZFX13ZGX" };
        const app = initializeApp(firebaseConfig); const db = getDatabase(app); const dbRef = ref(db, 'userData/vans');

        let appData = { ids: [] }; let currentEditingVIP = -1;
        const inventoryList = [
            { img: "shorn.png", name: "Wrathful Mind (เขาเล็ก)" }, { img: "mhorn.png", name: "Wrathful Will (เขากลาง)" }, { img: "lhorn.png", name: "Wrathful Ego (เขาใหญ่)" }, { img: "whorn.png", name: "Wrathful Wish (เขาทองแดง)" }, { img: "wshorn.png", name: "Wrathful Sublimation (เขาทองฟ้า)" }, { img: "rhorn.png", name: "Maddened Curse (เขาแดงมังกร)" }, { img: "ystone.png", name: "ลูกแก้วเหลือง" }, { img: "yamp.png", name: "Ampทอง" }, { img: "ramp.png", name: "Ampแดง" }, { img: "yampf.png", name: "เศษAmpทอง" }, { img: "rampf.png", name: "เศษAmpแดง" }, { img: "rodyle.png", name: "Radiant Odyle" }
        ];

        function getThaiTime() { const now = new Date(); return new Date(now.getTime() + (now.getTimezoneOffset() * 60000) + (3600000 * 7)); }
        function getBase4AM(t) { let d = new Date(t); if (d.getHours() < 4) d.setDate(d.getDate() - 1); d.setHours(4,0,0,0); return d.getTime(); }
        function getRecentWed4AM(t) { let d = new Date(t); let day = d.getDay(); if (day===3 && d.getHours()>=4) {} else { let diff = (day<3)?(day+4):(day-3); d.setDate(d.getDate()-diff); } d.setHours(4,0,0,0); return d.getTime(); }

        function processTimeLogic(data) {
            if (!data || !data.ids) return { ids: [] };
            const now = getThaiTime().getTime(); const c4AM = getBase4AM(now); const cWed = getRecentWed4AM(now);
            data.ids.forEach(id => {
                (id.characters || []).forEach(c => {
                    let last = c.lastUpdate || now;
                    if (last < cWed) { c.raid=c.asc=c.daily=c.duty=c.buy=c.craft=false; c.fb=35; }
                    if (last < c4AM) { let dP = Math.floor((c4AM - getBase4AM(last)) / 86400000); if (dP > 0) c.nm = Math.min(14, (parseInt(c.nm) || 0) + (2 * dP)); }
                    let l4S = getBase4AM(last);
                    let iPS = (Math.floor((c4AM-l4S)/86400000)*8) + Math.floor((now-c4AM)/10800000) - Math.floor((last-l4S)/10800000);
                    if (iPS > 0) c.stamina = Math.min(840, (parseInt(c.stamina)||0)+(iPS*(id.isVIP?15:10)));
                    let iPR = (Math.floor((c4AM-l4S)/86400000)*3) + Math.floor((now-c4AM)/28800000) - Math.floor((last-l4S)/28800000);
                    if (iPR > 0) c.rc = Math.min(21, (parseInt(c.rc)||0)+(iPR*1));
                    c.lastUpdate = now;
                });
            });
            return data;
        }

        window.syncDataFromUI = function() {
            const blocks = document.querySelectorAll('.id-container'); if (blocks.length === 0) return;
            appData.ids = Array.from(blocks).map((b, idx) => {
                return {
                    idName: b.querySelector('.id-name-input').value, kinahTotal: b.querySelector('.kinah-total-id').value, isVIP: b.querySelector('.vip-input').checked, vipExpiry: appData.ids[idx]?.vipExpiry || 0, trans: b.querySelector('.in-trans')?.value || 0, conq: b.querySelector('.in-conq')?.value || 0, setTotal: b.querySelector('.in-set-total')?.value || 0,
                    characters: Array.from(b.querySelectorAll('.char-table tbody tr')).map((row, cIdx) => ({
                        name: row.querySelector('.char-name').value, class: row.querySelector('.class-select').value, stamina: row.querySelector('.stam-main').value, staminaBonus: row.querySelector('.stam-bonus').value, duty: row.querySelector('.duty-check').checked, raid: row.querySelector('.raid-check').checked, asc: row.querySelector('.asc-check').checked, daily: row.querySelector('.daily-check').checked, nm: row.querySelector('.nm-main').value, nmBonus: row.querySelector('.nm-bonus').value, buy: row.querySelector('.buy-check').checked, craft: row.querySelector('.craft-check').checked, fb: row.querySelector('.fb-main').value, rc: row.querySelector('.rc-main').value, rcBonus: row.querySelector('.rc-bonus').value, lastUpdate: appData.ids[idx]?.characters[cIdx]?.lastUpdate || getThaiTime().getTime()
                    })),
                    inventory: Array.from(b.querySelectorAll('.inv-table tbody tr')).map(row => ({ trade: parseInt(row.querySelector('.inv-trade').value) || 0, nonTrade: parseInt(row.querySelector('.inv-non').value) || 0 }))
                };
            });
            set(dbRef, appData); updateCalculations();
        };

        function updateCalculations() {
            appData.ids.forEach((id, idx) => {
                const b = document.querySelectorAll('.id-container')[idx]; if (!b) return;
                let totalRuns = 0;
                (id.characters || []).forEach((c, cIdx) => {
                    const row = b.querySelectorAll('.char-table tbody tr')[cIdx]; if (!row) return;
                    const tS = (parseInt(c.stamina)||0) + (parseInt(c.staminaBonus)||0);
                    const tR = (parseInt(c.rc)||0) + (parseInt(c.rcBonus)||0);
                    const runs = Math.min(Math.floor(tS/80), parseInt(c.fb)||0, tR);
                    totalRuns += runs;
                    row.querySelector('.total-white-stam').innerText = tS; row.querySelector('.total-white-rc').innerText = tR;
                    const rC = row.querySelector('.live-run-count'); rC.innerText = runs; rC.className = 'live-run-count '+(runs===0?'red-text':'');
                });
                (id.inventory || []).forEach((inv, iIdx) => {
                    const row = b.querySelectorAll('.inv-table tbody tr')[iIdx];
                    if (row) row.querySelector('.total-glow').innerText = ((parseInt(inv.trade)||0) + (parseInt(inv.nonTrade)||0)).toLocaleString();
                });
                const cur = (parseInt(id.trans)||0) + (parseInt(id.conq)||0);
                b.querySelector('.summary-run-total').innerText = totalRuns;
                b.querySelector('.summary-current').innerText = cur;
                b.querySelector('.summary-remain').innerText = (parseInt(id.setTotal)||0) - cur;
            });
        }

        window.openVIP = (idx) => { currentEditingVIP = idx; document.getElementById('vipModal').style.display = 'flex'; };
        window.closeVIP = () => { document.getElementById('vipModal').style.display = 'none'; };
        window.confirmVIP = () => {
            const d = parseInt(document.getElementById('vDay').value)||0, h = parseInt(document.getElementById('vHour').value)||0, m = parseInt(document.getElementById('vMin').value)||0;
            appData.ids[currentEditingVIP].vipExpiry = getThaiTime().getTime() + (d*86400000) + (h*3600000) + (m*60000);
            closeVIP(); renderUI(); window.syncDataFromUI();
        };

        function renderUI() {
            if (!appData || !Array.isArray(appData.ids)) return;
            const wrapper = document.getElementById('main-wrapper'), now = getThaiTime().getTime(); const scroll = window.scrollY; wrapper.innerHTML = '';
            appData.ids.forEach((id, idx) => {
                if (!id) return;
                const b = document.createElement('div'); b.className = 'id-container';
                let vS = "", vC = "vip-red";
                if (id.vipExpiry > now) { const diff = id.vipExpiry-now, d = Math.floor(diff/86400000), h = Math.floor((diff%86400000)/3600000), m = Math.floor((diff%3600000)/60000); vS = `VIP คงเหลือ ${d} วัน ${h} ชม. ${m} นาที`; if (d>=7) vC = "vip-green"; }
                const charRows = (id.characters || []).map((c, cIdx) => `<tr><td><input type="text" class="char-name" value="${c.name||''}" oninput="window.syncDataFromUI()"></td><td><select class="class-select" onchange="window.syncDataFromUI()"><option value="">เลือกอาชีพ</option>${['Templar','Gladiator','Assassin','Sorceror','Elementalist','Cleric','Ranger','Chanter'].map(cls=>`<option value="${cls}" ${c.class===cls?'selected':''}>${cls}</option>`).join('')}</select></td><td><div class="split-input"><input type="number" class="standard-num stam-main" value="${c.stamina||0}" oninput="window.syncDataFromUI()"><span class="bonus-text">+(</span><input type="number" class="bonus-input stam-bonus" value="${c.staminaBonus||0}" oninput="window.syncDataFromUI()"><span class="bonus-text">)</span><span class="total-white total-white-stam">0</span></div></td><td><input type="checkbox" class="duty-check" ${c.duty?'checked':''} onchange="window.syncDataFromUI()"></td><td><input type="checkbox" class="raid-check" ${c.raid?'checked':''} onchange="window.syncDataFromUI()"></td><td><input type="checkbox" class="asc-check" ${c.asc?'checked':''} onchange="window.syncDataFromUI()"></td><td><input type="checkbox" class="daily-check" ${c.daily?'checked':''} onchange="window.syncDataFromUI()"></td><td><div class="split-input"><input type="number" class="standard-num nm-main" value="${c.nm||0}" oninput="window.syncDataFromUI()"><span class="bonus-text">+(</span><input type="number" class="bonus-input nm-bonus" value="${c.nmBonus||0}" oninput="window.syncDataFromUI()"><span class="bonus-text">)</span></div></td><td><input type="checkbox" class="buy-check" ${c.buy?'checked':''} onchange="window.syncDataFromUI()"></td><td><input type="checkbox" class="craft-check" ${c.craft?'checked':''} onchange="window.syncDataFromUI()"></td><td><input type="number" class="standard-num fb-main" value="${c.fb||0}" oninput="window.syncDataFromUI()"></td><td><div class="split-input"><input type="number" class="standard-num rc-main" value="${c.rc||0}" oninput="window.syncDataFromUI()"><span class="bonus-text">+(</span><input type="number" class="bonus-input rc-bonus" value="${c.rcBonus||0}" oninput="window.syncDataFromUI()"><span class="bonus-text">)</span><span class="total-white total-white-rc">0</span></div></td><td class="live-run-count">0</td><td><button class="btn-danger" onclick="window.removeCharacter(${idx}, ${cIdx})">ลบ</button></td></tr>`).join('');
                b.innerHTML = `<button class="btn-reset-id" onclick="window.resetIDToMax(${idx})">reset</button><div class="id-header"><label><input type="checkbox" class="vip-input" ${id.isVIP?'checked':''} onchange="window.syncDataFromUI()"> VIP</label><input type="text" class="id-name-input" value="${id.idName||''}" oninput="window.syncDataFromUI()"><button onclick="window.addCharacter(${idx})">+ เพิ่มตัวละคร</button><button class="btn-danger" onclick="window.removeID(${idx})">ลบ ID นี้</button><button onclick="openVIP(${idx})">ตั้งค่า vip</button><div class="kinah-id-wrapper">เงินรวม <input type="text" class="kinah-total-id" value="${id.kinahTotal||0}" oninput="window.syncDataFromUI()"></div><span class="vip-status ${vC}">${vS}</span></div><div class="tab-controls"><button class="btn-tab active" onclick="window.switchTab(this, 'char')">👥 จัดการตัวละคร</button><button class="btn-tab" onclick="window.switchTab(this, 'inv')">📦 คลังไอเทม</button></div><table class="char-table"><thead><tr><th>ชื่อ</th><th>อาชีพ</th><th>Stamina</th><th>Duty</th><th>Raid</th><th>Asc</th><th>Daily</th><th>Nightmare</th><th>Buy Stamina</th><th>Craft Stamina</th><th>Final Boss</th><th>Reward Count</th><th>รอบดันที่ลงได้</th><th>จัดการ</th></tr></thead><tbody>${charRows}</tbody></table><table class="inv-table" style="display:none"><thead><tr><th>รูป</th><th>ชื่อไอเทม</th><th>Tradable</th><th>Non-Tradable</th><th>Total</th></tr></thead><tbody>${inventoryList.map((item,i)=> { const inv = (id.inventory && id.inventory[i]) ? id.inventory[i] : { trade: 0, nonTrade: 0 }; return `<tr><td><img src="pic/${item.img}" width="28"></td><td style="text-align:left">${item.name}</td><td><input type="number" style="width:120px; text-align:right" class="inv-trade" value="${inv.trade||0}" oninput="window.syncDataFromUI()"></td><td><input type="number" style="width:120px; text-align:right" class="inv-non" value="${inv.nonTrade||0}" oninput="window.syncDataFromUI()"></td><td class="total-glow">0</td></tr>`; }).join('')}</tbody></table><div class="summary-table-container"><table class="summary-table"><tr><td>รอบดันที่ลงได้ (รวมทุกตัวละคร)</td><td class="summary-val summary-run-total">0</td></tr><tr><td>รอบ transcendence</td><td><input type="number" class="in-trans" value="${id.trans||0}" oninput="window.syncDataFromUI()"></td></tr><tr><td>รอบ conquest</td><td><input type="number" class="in-conq" value="${id.conq||0}" oninput="window.syncDataFromUI()"></td></tr><tr><td>รอบรวมที่ตั้งไว้</td><td><input type="number" class="in-set-total" value="${id.setTotal||0}" oninput="window.syncDataFromUI()"></td></tr><tr><td>รอบรวมปัจจุบัน</td><td class="summary-val summary-current">0</td></tr><tr><td>คงเหลือที่ต้องลง</td><td class="summary-val summary-remain">0</td></tr></table></div>`;
                wrapper.appendChild(b);
            });
            updateCalculations(); window.scrollTo(0, scroll);
        }

        window.addNewID = () => { appData.ids.push({ idName: "New ID", kinahTotal: 0, isVIP: false, characters: [], inventory: inventoryList.map(()=>({trade:0, nonTrade:0})) }); renderUI(); window.syncDataFromUI(); };
        window.addCharacter = (idx) => { appData.ids[idx].characters.push({ name:"", class:"", stamina:840, staminaBonus:0, rc:21, rcBonus:0, nm:14, nmBonus:0, fb:35, lastUpdate: getThaiTime().getTime() }); renderUI(); window.syncDataFromUI(); };
        window.removeCharacter = (idx, cIdx) => { if(confirm("ลบตัวละคร?")) { appData.ids[idx].characters.splice(cIdx,1); renderUI(); window.syncDataFromUI(); } };
        window.removeID = (idx) => { if(confirm("ลบ ID?")) { appData.ids.splice(idx,1); renderUI(); window.syncDataFromUI(); } };
        window.switchTab = (btn, tab) => { const c = btn.closest('.id-container'); Array.from(c.querySelectorAll('.btn-tab')).forEach(b => b.classList.remove('active')); btn.classList.add('active'); c.querySelector('.char-table').style.display = tab==='char'?'table':'none'; c.querySelector('.inv-table').style.display = tab==='inv'?'table':'none'; };
        window.resetIDToMax = (idx) => { if(confirm("Reset ID?")) { appData.ids[idx].characters.forEach(c => { c.stamina=840; c.nm=14; c.fb=35; c.rc=21; c.duty=c.raid=c.asc=c.daily=c.buy=c.craft=false; }); renderUI(); window.syncDataFromUI(); } };

        get(dbRef).then(snap => { 
            let raw = snap.val(); if(raw) { appData = processTimeLogic(raw); } else { window.addNewID(); }
            renderUI(); document.getElementById('loading').style.display = 'none'; 
        });
        setInterval(() => { updateCalculations(); }, 60000);
    </script>
</body>
</html>
