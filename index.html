<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AION2 Check List v1.83 (Weekly Tracker)</title>
    
    <script>
        if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 768) {
            window.location.href = "indexmobile.html"; 
        }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #0d1117; --panel-bg: rgba(22, 27, 34, 0.85); --neon-blue: #00f3ff; --text-main: #c9d1d9; --border-color: #30363d; --bonus-color: #ffb000; --danger-red: #ff4444; }
        body { background-image: linear-gradient(rgba(13, 17, 23, 0.85), rgba(13, 17, 23, 0.85)), url('pic/background.jpg'); background-size: cover; background-position: center; background-attachment: fixed; color: var(--text-main); font-family: 'Prompt', sans-serif; margin: 0; padding: 20px; }
        .stam-main.glow-red { border-color: var(--danger-red) !important; box-shadow: 0 0 8px var(--danger-red) !important; color: #fff; font-weight: bold; }
        .header-container { text-align: center; margin-bottom: 20px; }
        .logo-img { max-width: 200px; height: auto; margin-bottom: 10px; }
        h1 { color: var(--neon-blue); text-transform: uppercase; letter-spacing: 2px; margin: 0; text-shadow: 0 0 10px rgba(0, 243, 255, 0.5); font-size: 1.8rem; }
        .user-menu-bar { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 25px; background: var(--panel-bg); padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); }
        .user-select { background: #161b22; color: var(--neon-blue); border: 1px solid var(--neon-blue); padding: 5px 12px; border-radius: 4px; font-family: 'Prompt'; min-width: 150px; }
        .id-container { background-color: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 20px; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0, 243, 255, 0.1); position: relative; backdrop-filter: blur(5px); }
        .id-header { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid var(--border-color); flex-wrap: wrap; }
        .id-header input[type="text"].id-name-input { background: transparent; border: none; color: var(--neon-blue); font-size: 1.4rem; font-weight: bold; outline: none; border-bottom: 1px dashed var(--border-color); width: 130px; font-family: 'Prompt', sans-serif; }
        .stamina-alert-icon { display: none; background: var(--danger-red); color: white; width: 22px; height: 22px; border-radius: 50%; font-weight: bold; align-items: center; justify-content: center; font-size: 14px; box-shadow: 0 0 10px var(--danger-red); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.8; } 100% { transform: scale(1); opacity: 1; } }
        .kinah-id-wrapper { margin-left: auto; display: flex; align-items: center; gap: 10px; font-size: 0.85rem; padding-right: 110px; }
        .kinah-total-id { background: rgba(13, 17, 23, 0.8); border: 1px solid var(--neon-blue); color: #fff; padding: 5px 10px; border-radius: 4px; width: 150px; text-align: right; }
        .vip-status { font-size: 0.9rem; font-weight: bold; width: 100%; margin-top: 5px; }
        .vip-green { color: #00ff00; } .vip-red { color: #ff4444; }
        .btn-reset-id { position: absolute; top: 20px; right: 20px; background-color: transparent; color: var(--bonus-color); border: 1px solid var(--bonus-color); padding: 6px 12px; font-size: 0.9rem; border-radius: 4px; cursor: pointer; transition: 0.2s; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; text-align: center; font-size: 0.82rem; margin-bottom: 15px; }
        th, td { border: 1px solid var(--border-color); padding: 6px 2px; }
        th { background-color: rgba(33, 38, 45, 0.8); color: #ffffff; }
        input[type="number"], input[type="text"], select { background: rgba(13, 17, 23, 0.8); color: white; border: 1px solid #444; border-radius: 4px; padding: 4px; text-align: center; font-family: 'Prompt', sans-serif; }
        .split-input { display: flex; align-items: center; justify-content: flex-end; gap: 2px; }
        .total-white { color: #fff; font-weight: bold; min-width: 25px; text-align: right; }
        
        input[type="number"].bonus-input { color: var(--bonus-color) !important; border-color: #664400; width: 55px; padding: 2px; }
        input[type="number"].standard-num { width: 50px; }
        input[type="number"].rc-box-fix { width: 32px; color: white; }
        input[type="number"].rc-bonus-fix { width: 32px; color: var(--bonus-color) !important; border-color: #664400; }

        input[type="checkbox"] { accent-color: #00ff00; width: 18px; height: 18px; cursor: pointer; appearance: none; border: 2px solid #ff4444; border-radius: 3px; position: relative; background: rgba(255,0,0,0.1); }
        input[type="checkbox"]:checked { background-color: #00ff00; border-color: #00ff00; appearance: auto; }
        
        .summary-table-container { display: flex; justify-content: center; width: 100%; margin-top: 15px; }
        .summary-table { width: 550px !important; border: 1px solid var(--border-color); }
        .summary-table td { text-align: left; padding: 8px 15px; }
        .summary-val { color: var(--neon-blue); font-weight: bold; text-align: center !important; }
        button { background-color: transparent; color: var(--neon-blue); border: 1px solid var(--neon-blue); padding: 6px 10px; cursor: pointer; border-radius: 4px; font-weight: bold; font-family: 'Prompt', sans-serif; font-size: 0.75rem; }
        button:hover { background-color: var(--neon-blue); color: #000; }
        .btn-danger { color: #ff4444; border-color: #ff4444; }
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        .modal-content { background: #161b22; padding: 25px; border-radius: 10px; border: 2px solid var(--neon-blue); width: 340px; text-align: center; }
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0d1117; display: flex; justify-content: center; align-items: center; color: var(--neon-blue); font-size: 1.5rem; z-index: 9999; }
        .group-con { background-color: rgba(0, 243, 255, 0.05); }
        .group-tra { background-color: rgba(255, 176, 0, 0.05); }
    </style>
</head>
<body>
    <div id="loading">กำลังซิงค์ข้อมูล v1.83...</div>

    <div id="vipModal" class="modal"><div class="modal-content"><h3>ตั้งค่า VIP คงเหลือ</h3><div style="display:flex; gap:10px; justify-content:center; margin-bottom:15px;"><input type="number" id="vDay" placeholder="วัน" style="width:60px"><input type="number" id="vHour" placeholder="ชม" style="width:60px"><input type="number" id="vMin" placeholder="นาที" style="width:60px"></div><button onclick="window.confirmVIP()">ตกลง</button> <button class="btn-danger" onclick="closeModal('vipModal')">ยกเลิก</button></div></div>
    <div id="userModal" class="modal"><div class="modal-content"><h3>เพิ่ม User ใหม่</h3><input type="text" id="newUserName" placeholder="ชื่อ"><br><br><input type="password" id="newUserPass" placeholder="รหัสผ่าน"><br><br><button onclick="window.confirmAddUser()">ตกลง</button> <button class="btn-danger" onclick="closeModal('userModal')">ยกเลิก</button></div></div>
    <div id="passModal" class="modal"><div class="modal-content"><h3 id="passModalTitle">ใส่รหัสผ่าน</h3><input type="password" id="checkPass"><br><br><label style="color:#fff"><input type="checkbox" id="rememberMe"> จดจำรหัสผ่าน</label><br><br><button onclick="validateUser()">ตกลง</button> <button class="btn-danger" onclick="cancelLogin()">ยกเลิก</button></div></div>
    <div id="dunModal" class="modal"><div class="modal-content"><h3 id="dunTitle">ลงดันเจี้ยน</h3><input type="number" id="dunCount" value="1" min="1"><br><br><button onclick="confirmDun()">ตกลง</button> <button class="btn-danger" onclick="closeModal('dunModal')">ยกเลิก</button></div></div>

    <div class="header-container"><img src="pic/logo.png" alt="Logo" class="logo-img"><h1>AION2 Check List v1.83 by VANS</h1></div>

    <div class="user-menu-bar">
        <select id="userDropdown" class="user-select" onchange="handleUserSelect(this.value)"></select>
        <button onclick="document.getElementById('userModal').style.display='flex'">+ เพิ่ม User</button>
        <button onclick="refreshData()">🔄 รีเฟรช</button>
        <button class="btn-danger" onclick="deleteUser()">ลบ User นี้</button>
    </div>

    <div id="main-wrapper"></div>
    <div id="btn-add-id-container" style="text-align: center; margin-top: 20px; display: none;"><button onclick="addNewID()">+ เพิ่ม ID ใหม่</button></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const config = { apiKey: "AIzaSyB8vq1cDV3LuqRmqtNsUqNHjriaEI9oGMM", databaseURL: "https://aion2-checklist-vans-default-rtdb.asia-southeast1.firebasedatabase.app" };
        firebase.initializeApp(config);
        const db = firebase.database();

        let currentUser = ""; let appData = { ids: [] }; let pendingUser = "";
        let curDunID = -1, curDunChar = -1, curDunMode = "";

        function getThaiTime() { return new Date(new Date().getTime() + (new Date().getTimezoneOffset() * 60000) + (3600000 * 7)); }
        function getBase4AM(t) { let d = new Date(t); if (d.getHours() < 4) d.setDate(d.getDate() - 1); d.setHours(4,0,0,0); return d.getTime(); }
        function getRecentWed4AM(t) { let d = new Date(t); let day = d.getDay(); if (day===3 && d.getHours()<4) { d.setDate(d.getDate()-7); } else { let diff = (day<3)?(day+4):(day-3); d.setDate(d.getDate()-diff); } d.setHours(4,0,0,0); return d.getTime(); }

        async function runResetLogic(data) {
            if (!data || !data.ids || data.ids.length === 0) return data;
            const now = getThaiTime().getTime(); const c4AM = getBase4AM(now); const cWed = getRecentWed4AM(now);
            data.ids.forEach(id => {
                if(!id.characters) return;
                id.characters.forEach(c => {
                    let last = c.lastUpdate || now; let changed = false;
                    if (last < cWed) { c.fb = 35; c.fbT = 28; c.asc = false; c.checkC = false; c.checkT = false; changed = true; }
                    if (last < c4AM) { c.duty = false; let days = Math.floor((c4AM - getBase4AM(last)) / 86400000); if (days > 0) c.nm = Math.min(14, (parseInt(c.nm) || 0) + (2 * days)); changed = true; }
                    if (last < cWed) { id.buyStam = false; id.craftStam = false; id.dailyId = false; changed = true; }
                    let l4S = getBase4AM(last);
                    let iPS = (Math.floor((c4AM-l4S)/86400000)*8) + Math.floor((now-c4AM)/10800000) - Math.floor((last-l4S)/10800000);
                    if (iPS > 0) { c.stamina = Math.min(840, (parseInt(c.stamina)||0)+(iPS*(id.isVIP?15:10))); changed = true; }
                    let iPR_Con = Math.floor((now - l4S)/43200000) - Math.floor((last - l4S)/43200000);
                    if (iPR_Con > 0 && (parseInt(c.rc)||0) < 14) { c.rc = Math.min(14, (parseInt(c.rc)||0) + iPR_Con); changed = true; }
                    let iPR_Tra = Math.floor((now - l4S)/86400000) - Math.floor((last - l4S)/86400000);
                    if (iPR_Tra > 0 && (parseInt(c.rcT)||0) < 7) { c.rcT = Math.min(7, (parseInt(c.rcT)||0) + iPR_Tra); changed = true; }
                    if (changed) c.lastUpdate = now;
                });
            });
            return data;
        }

        window.loadUserList = function() {
            db.ref('userData').once('value').then(snap => {
                const dd = document.getElementById('userDropdown'); dd.innerHTML = '<option value="">-- เลือก User --</option>';
                if(snap.exists()) { Object.keys(snap.val()).forEach(u => { const opt = document.createElement('option'); opt.value = u; opt.text = u; dd.add(opt); }); }
                document.getElementById('loading').style.display = 'none';
            });
        };

        window.confirmAddUser = function() {
            const n = document.getElementById('newUserName').value.trim();
            const p = document.getElementById('newUserPass').value.trim();
            if(!n || !p) return alert("ห้ามว่าง");
            db.ref(`userData/${n}`).set({ ids: [], password: p }).then(() => { closeModal('userModal'); loadUserList(); });
        };

        window.handleUserSelect = function(u) {
            if(!u) return; pendingUser = u;
            db.ref(`userData/${u}/password`).once('value').then(snap => {
                const saved = localStorage.getItem(`pass_${u}`);
                if (snap.exists() && snap.val() !== "" && saved === snap.val()) { switchUser(u); }
                else { document.getElementById('passModal').style.display = 'flex'; }
            });
        };

        window.validateUser = function() {
            const p = document.getElementById('checkPass').value.trim(); const rem = document.getElementById('rememberMe').checked;
            db.ref(`userData/${pendingUser}/password`).once('value').then(snap => {
                if(snap.val() === p) { if(rem) localStorage.setItem(`pass_${pendingUser}`, p); closeModal('passModal'); switchUser(pendingUser); }
                else alert("รหัสผิด!");
            });
        };

        async function switchUser(u) {
            currentUser = u; document.getElementById('loading').style.display = 'flex';
            const snap = await db.ref(`userData/${u}`).once('value');
            let rawData = snap.val() || { ids: [] };
            appData = await runResetLogic(rawData);
            renderUI(); document.getElementById('btn-add-id-container').style.display = 'block'; document.getElementById('loading').style.display = 'none';
        }

        window.syncDataFromUI = function() {
            if(!currentUser) return;
            const idBlocks = document.querySelectorAll('.id-container');
            const now = getThaiTime().getTime();
            
            appData.ids = Array.from(idBlocks).map((b, i) => {
                const expiry = appData.ids[i]?.vipExpiry || 0;
                return {
                    idName: b.querySelector('.id-name-input').value, 
                    kinahTotal: b.querySelector('.kinah-total-id').value,
                    buyStam: b.querySelector('.buy-stam-id').checked,
                    craftStam: b.querySelector('.craft-stam-id').checked,
                    dailyId: b.querySelector('.daily-id').checked,
                    isVIP: (expiry > now), 
                    vipExpiry: expiry, 
                    trans: b.querySelector('.in-trans').value, 
                    conq: b.querySelector('.in-conq').value, 
                    setTotal: b.querySelector('.in-set-total').value,
                    characters: Array.from(b.querySelectorAll('.char-row')).map((row, ci) => ({
                        checkC: row.querySelector('.c-check-c').checked,
                        checkT: row.querySelector('.c-check-t').checked,
                        name: row.querySelector('.c-name').value, 
                        class: row.querySelector('.c-class').value, 
                        stamina: row.querySelector('.stam-main').value, 
                        staminaBonus: row.querySelector('.c-stam-b').value,
                        duty: row.querySelector('.c-duty').checked, 
                        asc: row.querySelector('.c-asc').checked,
                        nm: row.querySelector('.c-nm').value, 
                        nmBonus: row.querySelector('.c-nm-b').value, 
                        fb: row.querySelector('.c-fb').value, 
                        rc: row.querySelector('.c-rc').value, 
                        rcBonus: row.querySelector('.c-rc-b').value,
                        fbT: row.querySelector('.c-fb-t').value, 
                        rcT: row.querySelector('.c-rc-t').value, 
                        rcBonusT: row.querySelector('.c-rc-b-t').value,
                        lastUpdate: appData.ids[i]?.characters?.[ci]?.lastUpdate || now
                    }))
                };
            });
            db.ref(`userData/${currentUser}/ids`).set(appData.ids);
            updateCalcs(); 
        };

        function updateCalcs() {
            if (!appData || !appData.ids) return;
            const now = getThaiTime().getTime();
            appData.ids.forEach((id, idx) => {
                const b = document.querySelectorAll('.id-container')[idx]; if(!b) return;
                
                let vS = "", vC = "vip-red";
                if(id.vipExpiry > now) {
                    const diff = id.vipExpiry - now;
                    const d = Math.floor(diff/86400000), h = Math.floor((diff%86400000)/3600000), m = Math.floor((diff%3600000)/60000);
                    vS = `VIP คงเหลือ ${d} วัน ${h} ชม. ${m} นาที`;
                    if (d >= 7) vC = "vip-green";
                    id.isVIP = true;
                } else { id.isVIP = false; }
                
                if(b.querySelector('.vip-input')) b.querySelector('.vip-input').checked = id.isVIP;
                const vStat = b.querySelector('.vip-status'); if(vStat) { vStat.innerText = vS; vStat.className = "vip-status "+vC; }

                let tRunsCon = 0, tRunsTra = 0, hasFullStam = false;
                (id.characters || []).forEach((c, ci) => {
                    const row = b.querySelectorAll('.char-row')[ci]; if(!row) return;
                    
                    const mainS = parseInt(row.querySelector('.stam-main').value)||0; 
                    const totalS = mainS + (parseInt(row.querySelector('.c-stam-b').value)||0);
                    if (mainS >= 840) { row.querySelector('.stam-main').classList.add('glow-red'); hasFullStam = true; } 
                    else { row.querySelector('.stam-main').classList.remove('glow-red'); }
                    
                    // Conquest Tracker (35 - current FB)
                    const fbC = parseInt(row.querySelector('.c-fb').value)||0;
                    const usedCon = Math.max(0, 35 - fbC);
                    row.querySelector('.track-con').innerText = usedCon;

                    // Trancendense Tracker (28 - current FB-T)
                    const fbT = parseInt(row.querySelector('.c-fb-t').value)||0;
                    const usedTra = Math.max(0, 28 - fbT);
                    row.querySelector('.track-tra').innerText = usedTra;
                    
                    // Grand Total (Used C + Used T)
                    row.querySelector('.track-total').innerText = usedCon + usedTra;

                    const totalRCCon = (parseInt(row.querySelector('.c-rc').value)||0) + (parseInt(row.querySelector('.c-rc-b').value)||0);
                    const runsCon = Math.min(Math.floor(totalS/80), fbC, totalRCCon); 
                    tRunsCon += runsCon;
                    
                    const totalRCTra = (parseInt(row.querySelector('.c-rc-t').value)||0) + (parseInt(row.querySelector('.c-rc-b-t').value)||0);
                    const runsTra = Math.min(Math.floor(totalS/80), fbT, totalRCTra);
                    tRunsTra += runsTra;

                    row.querySelector('.total-white-stam').innerText = totalS;
                    row.querySelector('.rc-total').innerText = totalRCCon;
                    row.querySelector('.rc-total-t').innerText = totalRCTra;
                    row.querySelector('.run-count-con').innerText = runsCon;
                    row.querySelector('.run-count-tra').innerText = runsTra;
                });
                const alertIcon = b.querySelector('.stamina-alert-icon'); if(alertIcon) alertIcon.style.display = hasFullStam ? 'flex' : 'none';
                const cur = (parseInt(id.trans)||0) + (parseInt(id.conq)||0);
                b.querySelector('.summary-run-con').innerText = tRunsCon;
                b.querySelector('.summary-run-tra').innerText = tRunsTra;
                b.querySelector('.summary-current').innerText = cur;
                b.querySelector('.summary-remain').innerText = (parseInt(id.setTotal)||0) - cur;
            });
        }

        function renderUI() {
            const w = document.getElementById('main-wrapper'); w.innerHTML = '';
            if(!currentUser || !appData.ids) return;
            appData.ids.forEach((id, idx) => {
                const b = document.createElement('div'); b.className = 'id-container';
                const rows = (id.characters || []).map((c, ci) => `<tr class="char-row">
                    <td><input type="checkbox" class="c-check-c" ${c.checkC ? 'checked' : ''} onchange="syncDataFromUI()"></td>
                    <td><input type="checkbox" class="c-check-t" ${c.checkT ? 'checked' : ''} onchange="syncDataFromUI()"></td>
                    <td><input type="text" class="c-name" value="${c.name||''}" style="width:75px" onchange="syncDataFromUI()"></td>
                    <td><select class="c-class" onchange="syncDataFromUI()"><option value="">อาชีพ</option>${['Templar','Gladiator','Assassin','Sorceror','Elementalist','Cleric','Ranger','Chanter'].map(cls=>`<option value="${cls}" ${c.class===cls?'selected':''}>${cls}</option>`).join('')}</select></td>
                    <td><div class="split-input"><input type="number" class="standard-num stam-main" value="${c.stamina||0}" onchange="syncDataFromUI()">+<input type="number" class="bonus-input c-stam-b" value="${c.staminaBonus||0}" onchange="syncDataFromUI()"><span class="total-white total-white-stam">0</span></div></td>
                    <td><input type="checkbox" class="c-duty" ${c.duty?'checked':''} onchange="syncDataFromUI()"></td>
                    <td><input type="checkbox" class="c-asc" ${c.asc?'checked':''} onchange="syncDataFromUI()"></td>
                    <td><div class="split-input"><input type="number" style="width:32px" class="c-nm" value="${c.nm||14}" onchange="syncDataFromUI()">+<input type="number" class="bonus-input c-nm-b" value="${c.nmBonus||0}" style="width:32px" onchange="syncDataFromUI()"></div></td>
                    
                    <td class="group-con"><div class="split-input"><input type="number" class="rc-box-fix c-rc" value="${c.rc||0}" onchange="syncDataFromUI()">+<input type="number" class="rc-bonus-fix c-rc-b" value="${c.rcBonus||0}" onchange="syncDataFromUI()"><span class="total-white rc-total">0</span></div></td>
                    <td class="group-con"><input type="number" class="rc-box-fix c-fb" value="${c.fb===undefined?35:c.fb}" onchange="syncDataFromUI()"></td>
                    <td class="group-con run-count-con total-white">0</td>
                    <td class="group-con"><button onclick="openDunModal(${idx}, ${ci}, 'CON')">ดัน C</button></td>
                    <td class="group-con track-con total-white">0</td>

                    <td class="group-tra"><div class="split-input"><input type="number" class="rc-box-fix c-rc-t" value="${c.rcT||0}" onchange="syncDataFromUI()">+<input type="number" class="rc-bonus-fix c-rc-b-t" value="${c.rcBonusT||0}" onchange="syncDataFromUI()"><span class="total-white rc-total-t">0</span></div></td>
                    <td class="group-tra"><input type="number" class="rc-box-fix c-fb-t" value="${c.fbT===undefined?28:c.fbT}" onchange="syncDataFromUI()"></td>
                    <td class="group-tra run-count-tra total-white">0</td>
                    <td class="group-tra"><button onclick="openDunModal(${idx}, ${ci}, 'TRA')">ดัน T</button></td>
                    <td class="group-tra track-tra total-white">0</td>

                    <td class="track-total total-white" style="font-size:1rem; color:var(--neon-blue);">0</td>
                    <td><button class="btn-danger" onclick="removeChar(${idx}, ${ci})">ลบ</button></td>
                </tr>`).join('');
                b.innerHTML = `
                    <div class="id-header">
                        <div class="stamina-alert-icon">!</div><input type="checkbox" class="vip-input" disabled> VIP 
                        <input type="text" class="id-name-input" value="${id.idName||''}" onchange="syncDataFromUI()">
                        <button onclick="addChar(${idx})">+ ตัวละคร</button>
                        <button onclick="openVIPModal(${idx})">VIP</button>
                        <div class="kinah-id-wrapper">
                            <span>Buy <input type="checkbox" class="buy-stam-id" ${id.buyStam?'checked':''} onchange="syncDataFromUI()"></span>
                            <span>Craft <input type="checkbox" class="craft-stam-id" ${id.craftStam?'checked':''} onchange="syncDataFromUI()"></span>
                            <span>Daily <input type="checkbox" class="daily-id" ${id.dailyId?'checked':''} onchange="syncDataFromUI()"></span>
                            <span>เงินรวม <input type="text" class="kinah-total-id" value="${id.kinahTotal||0}" onchange="syncDataFromUI()"></span>
                        </div>
                        <button class="btn-reset-id" onclick="resetIDToMax(${idx})">reset</button>
                        <span class="vip-status"></span>
                    </div>
                    <table class="char-t">
                        <thead>
                            <tr><th rowspan="2">C</th><th rowspan="2">T</th><th rowspan="2">ชื่อ</th><th rowspan="2">อาชีพ</th><th rowspan="2">Stamina</th><th colspan="3">General</th><th colspan="5" class="group-con">Conquest</th><th colspan="5" class="group-tra">Trancendense</th><th rowspan="2">รวม</th><th rowspan="2">จัดการ</th></tr>
                            <tr><th>Duty</th><th>Asc</th><th>Nightmare</th><th class="group-con">RC</th><th class="group-con">FB</th><th class="group-con">รอบ</th><th class="group-con">ดัน</th><th class="group-con">ลงไป</th><th class="group-tra">RC</th><th class="group-tra">FB</th><th class="group-tra">รอบ</th><th class="group-tra">ดัน</th><th class="group-tra">ลงไป</th></tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>
                    <div class="summary-table-container">
                        <table class="summary-table">
                            <tr><td>รอบ Conquest (รวม)</td><td class="summary-val summary-run-con">0</td></tr>
                            <tr><td>รอบ Trancendense (รวม)</td><td class="summary-val summary-run-tra">0</td></tr>
                            <tr><td>รอบ Transcendence สะสม</td><td><input type="number" class="in-trans" value="${id.trans||0}" onchange="syncDataFromUI()"></td></tr>
                            <tr><td>รอบ Conquest สะสม</td><td><input type="number" class="in-conq" value="${id.conq||0}" onchange="syncDataFromUI()"></td></tr>
                            <tr><td>เป้าหมายรวม</td><td><input type="number" class="in-set-total" value="${id.setTotal||0}" onchange="syncDataFromUI()"></td></tr>
                            <tr><td>รวมปัจจุบัน</td><td class="summary-val summary-current">0</td></tr>
                            <tr><td>คงเหลือ</td><td class="summary-val summary-remain">0</td></tr>
                        </table>
                    </div>`;
                w.appendChild(b);
            });
            updateCalcs();
        }

        window.openDunModal = (i, ci, mode) => { curDunID=i; curDunChar=ci; curDunMode=mode; document.getElementById('dunTitle').innerText = mode === 'CON' ? 'ลงดัน Conquest' : 'ลงดัน Trancendense'; document.getElementById('dunModal').style.display='flex'; };
        window.confirmDun = function() {
            const count = parseInt(document.getElementById('dunCount').value); if (count <= 0) return;
            const id = appData.ids[curDunID]; const c = id.characters[curDunChar];
            const cost = id.isVIP ? 80 : 40; const totalCost = count * cost;
            const sM = parseInt(c.stamina)||0, sB = parseInt(c.staminaBonus)||0;
            if ((sM+sB) < totalCost) return alert("Stamina ไม่พอ");
            if (curDunMode === 'CON') {
                const rcM = parseInt(c.rc)||0, rcB = parseInt(c.rcBonus)||0, fb = parseInt(c.fb)||35;
                if ((rcM+rcB) < count) return alert("RC ไม่พอ"); if (fb < count) return alert("FB ไม่พอ");
                if (sM >= totalCost) c.stamina = sM - totalCost; else { c.stamina = 0; c.staminaBonus = sB - (totalCost - sM); }
                if (rcM >= count) c.rc = rcM - count; else { c.rc = 0; c.rcBonus = rcB - (count - rcM); }
                c.fb = fb - count;
            } else {
                const rcM = parseInt(c.rcT)||0, rcB = parseInt(c.rcBonusT)||0, fb = parseInt(c.fbT)||28;
                if ((rcM+rcB) < count) return alert("RC ไม่พอ"); if (fb < count) return alert("FB ไม่พอ");
                if (sM >= totalCost) c.stamina = sM - totalCost; else { c.stamina = 0; c.staminaBonus = sB - (totalCost - sM); }
                if (rcM >= count) c.rcT = rcM - count; else { c.rcT = 0; c.rcBonusT = rcB - (count - rcM); }
                c.fbT = fb - count;
            }
            closeModal('dunModal'); renderUI(); syncDataFromUI();
        };

        window.closeModal = (id) => document.getElementById(id).style.display='none';
        window.refreshData = () => { if(currentUser) switchUser(currentUser); };
        window.deleteUser = function() { if(currentUser && confirm("ลบ?")) { db.ref(`userData/${currentUser}`).remove(); localStorage.removeItem(`pass_${currentUser}`); currentUser=""; loadUserList(); renderUI(); } };
        window.addNewID = () => { if(!appData.ids) appData.ids=[]; appData.ids.push({idName:"ID ใหม่", characters:[]}); renderUI(); syncDataFromUI(); };
        window.addChar = (i) => { appData.ids[i].characters.push({name:"", stamina:840, fb:35, rc:14, fbT:28, rcT:7, lastUpdate: getThaiTime().getTime()}); renderUI(); syncDataFromUI(); };
        window.removeChar = (i, ci) => { if(confirm("ลบ?")) { appData.ids[i].characters.splice(ci,1); renderUI(); syncDataFromUI(); } };
        window.openVIPModal = (i) => { currentEditingVIP=i; document.getElementById('vipModal').style.display='flex'; };
        window.confirmVIP = () => { 
            const d=parseInt(document.getElementById('vDay').value)||0, h=parseInt(document.getElementById('vHour').value)||0, m=parseInt(document.getElementById('vMin').value)||0; 
            appData.ids[currentEditingVIP].vipExpiry = getThaiTime().getTime() + (d*86400000) + (h*3600000) + (m*60000); 
            closeModal('vipModal'); renderUI(); syncDataFromUI(); 
        };
        window.resetIDToMax = (idx) => { if(confirm("Reset ID?")) { appData.ids[idx].characters.forEach(c => { c.stamina=840; c.nm=14; c.fb=35; c.rc=14; c.fbT=28; c.rcT=7; c.duty=c.asc=false; c.checkC=false; c.checkT=false; }); renderUI(); syncDataFromUI(); } };
        setInterval(() => { if(currentUser) updateCalcs(); }, 60000);
        window.loadUserList();
    </script>
</body>
</html>
